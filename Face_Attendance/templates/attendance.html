<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attendance Records</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2b2b45);
            color: #fff;
        }

        .container {
            width: 90%;
            margin: 40px auto;
            animation: fadeIn 0.8s ease;
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .badge {
            background: #00c6ff;
            color: #000;
            padding: 10px 18px;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(0, 198, 255, 0.6);
        }

        .search {
            padding: 10px 15px;
            border-radius: 20px;
            border: none;
            outline: none;
            width: 220px;
            font-size: 14px;
        }

        .attendance-table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        .attendance-table th {
            background: #00c6ff;
            color: #000;
            padding: 14px;
            text-align: center;
            font-size: 15px;
        }

        .attendance-table td {
            padding: 12px;
            text-align: center;
            font-size: 14px;
        }

        .attendance-table tr:nth-child(even) {
            background: #f2f2f2;
        }

        .attendance-table tr:hover {
            background: #dff6ff;
            transform: scale(1.01);
            transition: 0.2s;
        }

        .back-btn {
            display: block;
            margin: 30px auto 0;
            padding: 12px 30px;
            background: #ff4b5c;
            color: #fff;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #ff1f3d;
            box-shadow: 0 0 15px rgba(255, 75, 92, 0.7);
        }

        .download-btn {
    display: block;
    margin: 15px auto;
    padding: 12px 30px;
    background: #00c853;
    color: #fff;
    border: none;
    border-radius: 25px;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.download-btn:hover {
    background: #00a844;
    box-shadow: 0 0 15px rgba(0, 200, 83, 0.7);
}


        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h1>📋 Attendance Records</h1>

    <div class="top-bar">
        <div class="badge">Total Present: {{ total }}</div>
        <input class="search" type="text" placeholder="🔍 Search name..." onkeyup="filterTable(this.value)">
    </div>

    <!-- ✅ TABLE FROM FLASK -->
    {{ table | safe }}

    <button class="back-btn" onclick="goHome()">⬅ Back to Camera</button>
    <button class="download-btn" onclick="downloadFile()">⬇ Download CSV</button>
    <button onclick="window.location.href='/logout'" 
        style="position:absolute; top:20px; right:20px; padding:8px 15px; background:red; color:white; border:none; border-radius:8px;">
    Logout
</button>
</div>



<script>
    function filterTable(value) {
        value = value.toLowerCase();
        const rows = document.querySelectorAll(".attendance-table tbody tr");

        rows.forEach(row => {
            const text = row.innerText.toLowerCase();
            row.style.display = text.includes(value) ? "" : "none";
        });
    }

    function goHome() {
        window.location.href = "/";
    }

    function downloadFile() {
    window.location.href = "/download";
}

</script>

</body>
</html>
